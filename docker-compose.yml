services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: underwriter
      POSTGRES_PASSWORD: underwriter
      POSTGRES_DB: underwriter
    ports:
      - "5432:5432"
    volumes:
      - db_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U underwriter -d underwriter"]
      interval: 5s
      timeout: 3s
      retries: 10

  api:
    build: .
    depends_on:
      db:
        condition: service_healthy
    environment:
      APP_ENV: development
      DEBUG: "true"
      DATABASE_URL: postgresql+psycopg2://underwriter:underwriter@db:5432/underwriter
      JWT_SECRET: dev-secret-please-change
      CORS_ORIGINS: "*"
      BOOTSTRAP_ADMIN_EMAIL: admin@underwriter.example
      BOOTSTRAP_ADMIN_PASSWORD: admin12345
    ports:
      - "8000:8000"
    volumes:
      - uploads:/app/uploads

volumes:
  db_data:
  uploads:
